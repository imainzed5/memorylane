name: Release installers

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Git tag to build and publish"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release-installer-publish
  cancel-in-progress: false

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installers
        run: npm run build:desktop

      - name: Stage release assets
        shell: pwsh
        run: |
          $bundleRoot = Join-Path $env:LOCALAPPDATA "memorylane\cargo-target\release\bundle"
          $stagingDir = Join-Path $env:GITHUB_WORKSPACE "release-assets"

          if (-not (Test-Path $bundleRoot)) {
            throw "Bundle output not found at $bundleRoot"
          }

          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null

          Get-ChildItem -Path $bundleRoot -Recurse -File |
            Where-Object { $_.Extension -in '.msi', '.exe', '.zip' } |
            Copy-Item -Destination $stagingDir -Force

          Get-ChildItem -Path $stagingDir

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          name: MemoryLane ${{ github.event_name == 'workflow_dispatch' && inputs.tag_name || github.ref_name }}
          generate_release_notes: true
          overwrite_files: true
          files: |
            release-assets/*.msi
            release-assets/*.exe
            release-assets/*.zip
          fail_on_unmatched_files: true
